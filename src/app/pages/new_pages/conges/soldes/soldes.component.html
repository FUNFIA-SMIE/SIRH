<div class="p-4 sm:p-8 bg-slate-50 dark:bg-slate-950 min-h-screen transition-colors duration-300">
  <div class="max-w-7xl mx-auto">

    <div class="mb-10">
      <h1 class="text-3xl font-extrabold text-slate-900 dark:text-white tracking-tight">Gestion des Soldes</h1>
    </div>

    <div
      class="bg-white dark:bg-slate-900 rounded-2xl shadow-xl border border-slate-200 dark:border-slate-800 overflow-hidden">
      <table class="w-full">
        <thead>
          <tr class="bg-slate-50/50 dark:bg-slate-800/50 text-left">
            <th class="px-6 py-4 text-xs font-bold text-slate-400 uppercase tracking-widest">Collaborateur</th>
            <th class="px-6 py-4 text-xs font-bold text-slate-400 uppercase tracking-widest text-center">CP</th>
            <th class="px-6 py-4 text-xs font-bold text-slate-400 uppercase tracking-widest text-center">RTT</th>
            <th class="px-6 py-4 text-xs font-bold text-slate-400 uppercase tracking-widest text-right">Actions</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-slate-100 dark:divide-slate-800">
          <tr *ngFor="let p of personnels" class="hover:bg-slate-50/50 dark:hover:bg-slate-800/30">
            <td class="px-6 py-4">
              <div class="flex items-center gap-4">
                <div class="relative h-11 w-11 flex-shrink-0">
                  <img *ngIf="p.photo_url" [src]="p.photo_url" [alt]="p.nom"
                    class="h-full w-full rounded-full object-cover border-2 border-white dark:border-slate-700 shadow-sm"
                    (error)="p.photo_url = null">
                  <div *ngIf="!p.photo_url"
                    class="h-full w-full rounded-full bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center font-bold text-white text-xs border-2 border-white dark:border-slate-700 shadow-sm">
                    {{p.initiales}}
                  </div>

                  <span
                    class="absolute bottom-0 right-0 block h-3 w-3 rounded-full bg-emerald-500 border-2 border-white dark:border-slate-900"></span>
                </div>

                <div>
                  <div class="text-sm font-bold dark:text-white">{{p.nom}} {{p.prenom}}</div>
                  <div class="text-[11px] text-slate-500 dark:text-slate-400 font-medium uppercase tracking-tight">
                    {{p.departement}}</div>
                </div>
              </div>
            </td>
            <td class="px-6 py-4 text-center font-bold dark:text-slate-200">{{p.soldeCP}}j</td>
            <td class="px-6 py-4 text-center font-bold dark:text-slate-200">{{p.soldeRTT}}j</td>
            <td class="px-6 py-4 text-right">
              <button (click)="ouvrirModal(p)"
                class="group px-4 py-1.5 bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-200 border border-slate-200 dark:border-slate-700 rounded-lg text-xs font-bold hover:bg-blue-600 hover:text-white hover:border-blue-600 transition-all duration-200 shadow-sm">
                Ajuster
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<div *ngIf="isModalOpen" class="fixed inset-0 z-50 flex items-center justify-center p-4">
  <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" (click)="fermerModal()"></div>

  <div
    class="relative bg-white dark:bg-slate-900 w-full max-w-md rounded-2xl shadow-2xl border border-slate-200 dark:border-slate-800 overflow-hidden animate-in zoom-in duration-200">
    <div class="px-6 py-4 border-b border-slate-100 dark:border-slate-800 flex justify-between items-center">
      <h2 class="text-lg font-bold dark:text-white">Ajustement pour {{selectedPersonnel?.nom}}</h2>
      <button (click)="fermerModal()" class="text-slate-400 hover:text-slate-600">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <div class="p-6 space-y-4">
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-bold text-slate-400 uppercase mb-1">Type</label>
          <select [(ngModel)]="typeSelectionne"
            class="w-full p-2 rounded-xl border dark:bg-slate-800 dark:text-white dark:border-slate-700 outline-none focus:ring-2 focus:ring-blue-500">
            <option value="CP">Congés Payés</option>
            <option value="RTT">RTT</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-400 uppercase mb-1">Nombre de jours</label>
          <input type="number" [(ngModel)]="valeurAjout"
            class="w-full p-2 rounded-xl border dark:bg-slate-800 dark:text-white dark:border-slate-700 outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="Ex: 2">
        </div>
      </div>

      <div>
        <label class="block text-xs font-bold text-slate-400 uppercase mb-1">Motif de l'ajustement</label>
        <textarea [(ngModel)]="motif" rows="3"
          class="w-full p-2 rounded-xl border dark:bg-slate-800 dark:text-white dark:border-slate-700 outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="Ex: Prime exceptionnelle, régularisation..."></textarea>
      </div>
    </div>

    <div class="px-6 py-4 bg-slate-50 dark:bg-slate-800/50 flex gap-3">
      <button (click)="fermerModal()"
        class="flex-1 px-4 py-2 border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 font-bold rounded-xl hover:bg-slate-100 transition-all">
        Annuler
      </button>
      <button (click)="validerAjout()"
        class="flex-1 px-4 py-2 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 shadow-lg shadow-blue-500/30 transition-all">
        Confirmer
      </button>
    </div>
  </div>
</div>
