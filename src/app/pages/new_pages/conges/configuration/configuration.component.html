<div class="p-6 bg-gray-50 min-h-screen">
  <div class="max-w-7xl mx-auto">
    <h1 class="text-3xl font-bold text-gray-900 mb-6">Configuration des Types de Congé</h1>

    <!-- Add/Edit Form -->
    <div class="bg-white shadow-lg rounded-lg p-6 mb-6">
      <h2 class="text-xl font-semibold text-gray-800 mb-4">{{ isEditing ? 'Modifier' : 'Ajouter' }} un Type de Congé</h2>

      <form (ngSubmit)="saveTypeConge()" #typeCongeForm="ngForm">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label for="code" class="block text-sm font-medium text-gray-700">Code</label>
            <input type="text" id="code" name="code" [(ngModel)]="currentType.code" required
                   class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
          </div>

          <div>
            <label for="libelle" class="block text-sm font-medium text-gray-700">Libellé</label>
            <input type="text" id="libelle" name="libelle" [(ngModel)]="currentType.libelle" required
                   class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
          </div>

          <div>
            <label for="typeEnum" class="block text-sm font-medium text-gray-700">Type</label>
            <select id="typeEnum" name="typeEnum" [(ngModel)]="currentType.typeEnum" required
                    class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
              <option value="annuel">Annuel</option>
              <option value="maladie">Maladie</option>
              <option value="maternite">Maternité</option>
              <option value="autre">Autre</option>
            </select>
          </div>

          <div>
            <label for="soldeInitialJours" class="block text-sm font-medium text-gray-700">Solde Initial (jours)</label>
            <input type="number" id="soldeInitialJours" name="soldeInitialJours" [(ngModel)]="currentType.soldeInitialJours" required
                   class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
          </div>

          <div>
            <label for="delaiReponseH" class="block text-sm font-medium text-gray-700">Délai de Réponse (heures)</label>
            <input type="number" id="delaiReponseH" name="delaiReponseH" [(ngModel)]="currentType.delaiReponseH" required
                   class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
          </div>

          <div>
            <label for="anticipationMinJ" class="block text-sm font-medium text-gray-700">Anticipation Minimale (jours)</label>
            <input type="number" id="anticipationMinJ" name="anticipationMinJ" [(ngModel)]="currentType.anticipationMinJ" required
                   class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
          </div>
        </div>

        <div class="mt-6 flex space-x-4">
          <button type="submit" [disabled]="!typeCongeForm.valid"
                  class="bg-indigo-600 hover:bg-indigo-700 disabled:bg-gray-400 text-white px-4 py-2 rounded-md text-sm font-medium">
            {{ isEditing ? 'Modifier' : 'Ajouter' }}
          </button>
          <button type="button" (click)="cancelEdit()"
                  class="bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded-md text-sm font-medium">
            Annuler
          </button>
        </div>
      </form>
    </div>

    <!-- List of Types -->
    <div class="bg-white shadow-lg rounded-lg overflow-hidden">
      <div class="px-6 py-4 bg-gray-100 border-b border-gray-200">
        <h2 class="text-xl font-semibold text-gray-800">Types de Congé Existants</h2>
      </div>

      <div class="overflow-x-auto">
        <table class="min-w-full divide-y divide-gray-200">
          <thead class="bg-gray-50">
            <tr>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Code</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Libellé</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Type</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Solde Initial</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Actif</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
            </tr>
          </thead>
          <tbody class="bg-white divide-y divide-gray-200">
            <tr *ngFor="let type of typesConge">
              <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">{{ type.code }}</td>
              <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{{ type.libelle }}</td>
              <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{{ type.typeEnum }}</td>
              <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{{ type.soldeInitialJours }} jours</td>
              <td class="px-6 py-4 whitespace-nowrap">
                <span [ngClass]="type.actif ? 'text-green-600' : 'text-red-600'" class="text-sm font-medium">
                  {{ type.actif ? 'Oui' : 'Non' }}
                </span>
              </td>
              <td class="px-6 py-4 whitespace-nowrap text-sm font-medium">
                <button (click)="editType(type)" class="text-indigo-600 hover:text-indigo-900 mr-3">Modifier</button>
                <button  class="text-red-600 hover:text-red-900">Supprimer</button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
