<div class="p-6 bg-gray-50 dark:bg-gray-950 min-h-screen transition-colors duration-300">
  
  <div class="mb-8 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
    <div>
      <h2 class="text-3xl font-extrabold text-gray-900 dark:text-white tracking-tight">Notre Équipe</h2>
      <p class="text-lg text-gray-600 dark:text-gray-400 mt-1">Gérez les profils et les rôles des membres de l'entreprise.</p>
    </div>
    
    <div class="flex items-center gap-3">
      <button routerLink="/new_employe" class="inline-flex items-center gap-2 px-5 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold rounded-xl shadow-md transition-all hover:scale-105 active:scale-95 focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 dark:focus:ring-offset-gray-950">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
        Ajouter un(e) employé(e)
      </button>

      <button (click)="toggleDarkMode()" class="p-2.5 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
        <svg class="w-5 h-5 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
        <svg class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
      </button>
    </div>
  </div>

  <div class="mb-10 flex flex-col sm:flex-row gap-4 items-center justify-between bg-white dark:bg-gray-900 p-5 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800 transition-colors">
    <div class="relative w-full sm:w-96">
      <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400 dark:text-gray-500">
        <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
      </span>
      <input type="text" placeholder="Rechercher par nom ou email..." class="block w-full pl-11 pr-4 py-3 bg-gray-50 dark:bg-gray-800 text-gray-900 dark:text-white border border-gray-200 dark:border-gray-700 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent text-sm transition-colors">
    </div>
    <div class="flex gap-3 w-full sm:w-auto">
      <select class="w-full sm:w-auto bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 text-gray-700 dark:text-gray-300 text-sm rounded-xl p-3 outline-none focus:ring-2 focus:ring-indigo-500 transition-colors">
        <option>Tous les départements</option>
        <option>Médecine du travail</option>
        <option>Administration</option>
      </select>
      <button class="p-3 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"></path></svg>
      </button>
    </div>
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
    <div *ngFor="let emp of data_employe" class="bg-white dark:bg-gray-900 rounded-2xl p-6 shadow-sm border border-gray-100 dark:border-gray-800 hover:shadow-lg dark:hover:border-indigo-800 transition-all group overflow-hidden relative">
      
      <div class="absolute top-0 left-0 right-0 h-1 bg-indigo-600 transform scale-x-0 group-hover:scale-x-100 transition-transform duration-300"></div>

      <div class="flex flex-col items-center text-center">
        <div class="mb-5 relative">
          <img [src]="emp.photo_url || 'https://images.unsplash.com/photo-1544005313-94ddf0286df2?&w=200&q=80&auto=format&fit=crop'" [alt]="emp.nom_employe + ' ' + emp.prenom_employe" class="h-24 w-24 rounded-full object-cover border-4 border-gray-100 dark:border-gray-800 shadow-inner group-hover:scale-105 transition-transform duration-300">
          
          <span [ngClass]="{
            'bg-green-500': emp.statut === 'actif' || emp.statut === 'Actif',
            'bg-yellow-500': emp.statut === 'en congé' || emp.statut === 'En congé'
          }" class="absolute bottom-1 right-1 block h-5 w-5 rounded-full border-2 border-white dark:border-gray-900 shadow-md"></span>
        </div>

        <h3 class="text-xl font-bold text-gray-900 dark:text-white group-hover:text-indigo-600 dark:group-hover:text-indigo-400 transition-colors">{{ emp.nom_employe }} {{ emp.prenom_employe }}</h3>
        <p class="text-sm text-gray-500 dark:text-gray-400 mt-1 mb-4 break-all">{{ emp.email_pro || emp.email || 'Pas d\'email' }}</p>

        <div class="w-16 h-px bg-gray-200 dark:bg-gray-700 mb-4"></div>

        <div class="mb-5 flex-grow">
          <div class="text-sm font-semibold text-gray-700 dark:text-gray-300">{{ emp.intitule_poste || 'Poste non défini' }}</div>
          <div class="text-xs text-gray-400 dark:text-gray-500 mt-1">{{ emp.nom_departement || 'Département non défini' }}</div>
        </div>

        <div class="flex gap-2.5 mt-auto pt-4 border-t border-gray-100 dark:border-gray-800 w-full justify-center">
          <button (click)="editEmployee(emp.employe_id || emp.id)" class="p-2.5 bg-gray-50 dark:bg-gray-800 rounded-lg text-gray-600 dark:text-gray-400 hover:bg-indigo-50 dark:hover:bg-indigo-950 hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors" title="Modifier le profil">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
          </button>
          <button (click)="viewEmployee(emp.employe_id || emp.id)" class="p-2.5 bg-gray-50 dark:bg-gray-800 rounded-lg text-gray-600 dark:text-gray-400 hover:bg-green-50 dark:hover:bg-green-950 hover:text-green-600 dark:hover:text-green-400 transition-colors" title="Voir les détails">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.478 0-8.268-2.943-9.542-7z"></path></svg>
          </button>
          <button (click)="deleteEmployee(emp.employe_id || emp.id)" class="p-2.5 bg-gray-50 dark:bg-gray-800 rounded-lg text-gray-600 dark:text-gray-400 hover:bg-red-50 dark:hover:bg-red-950 hover:text-red-600 dark:hover:text-red-400 transition-colors" title="Supprimer l'employé">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"></path></svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="mt-12 flex items-center justify-center gap-2">
    <button class="px-5 py-2.5 bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-xl text-sm font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">Plus d'employés</button>
  </div>
</div>
