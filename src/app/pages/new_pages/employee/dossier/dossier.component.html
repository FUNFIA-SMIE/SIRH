<div class="flex h-screen bg-gray-50 dark:bg-gray-950 transition-colors duration-300">
  
  <aside class="w-64 bg-white dark:bg-gray-900 border-r border-gray-200 dark:border-gray-800 hidden md:block">
    <div class="p-6">
      <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Classement RH</h3>
      <nav class="mt-4 space-y-2">
        <a href="#" class="flex items-center gap-3 p-2 text-indigo-600 bg-indigo-50 dark:bg-indigo-900/20 rounded-lg font-medium">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path></svg>
          Tous les dossiers
        </a>
        <a href="#" class="flex items-center gap-3 p-2 text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg transition-colors">
          <div class="w-2 h-2 rounded-full bg-blue-500"></div> Recrutement
        </a>
        <a href="#" class="flex items-center gap-3 p-2 text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg transition-colors">
          <div class="w-2 h-2 rounded-full bg-red-500"></div> Dossiers Médicaux
        </a>
        <a href="#" class="flex items-center gap-3 p-2 text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg transition-colors">
          <div class="w-2 h-2 rounded-full bg-green-500"></div> Contrats & Paie
        </a>
      </nav>
    </div>
  </aside>

  <main class="flex-1 overflow-y-auto p-8">
    
    <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
      <div>
        <h2 class="text-2xl font-bold text-gray-900 dark:text-white">Gestion des Dossiers</h2>
        <p class="text-gray-500 dark:text-gray-400">Classement centralisé des documents collaborateurs</p>
      </div>
      <button class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2.5 rounded-xl font-semibold shadow-sm transition-transform active:scale-95">
        + Nouveau Dossier
      </button>
    </div>

    <div class="flex flex-wrap gap-4 mb-6">
      <div class="relative flex-1 min-w-[300px]">
        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        </span>
        <input type="text" placeholder="Rechercher un employé ou un dossier..." 
               class="w-full pl-10 pr-4 py-2.5 bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none dark:text-white transition-all">
      </div>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
      
      <div *ngFor="let folder of folders" 
           class="group bg-white dark:bg-gray-900 p-5 rounded-2xl border border-gray-100 dark:border-gray-800 hover:border-indigo-500 dark:hover:border-indigo-600 shadow-sm hover:shadow-md transition-all cursor-pointer">
        
        <div class="flex justify-between items-start mb-4">
          <div class="p-3 rounded-xl bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400">
            <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 20 20"><path d="M2 6a2 2 0 012-2h5l2 2h5a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V6z"></path></svg>
          </div>
          <button class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-200">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10 6a2 2 0 110-4 2 2 0 010 4zM10 12a2 2 0 110-4 2 2 0 010 4zM10 18a2 2 0 110-4 2 2 0 010 4z"></path></svg>
          </button>
        </div>

        <h3 class="font-bold text-gray-900 dark:text-white truncate">{{ folder.name }}</h3>
        <p class="text-xs text-gray-500 dark:text-gray-400 mt-1 italic">{{ folder.category }}</p>

        <div class="mt-6 flex items-center justify-between border-t border-gray-50 dark:border-gray-800 pt-4">
          <div class="flex flex-col">
            <span class="text-[10px] text-gray-400 uppercase font-bold">Documents</span>
            <span class="text-sm font-semibold text-gray-700 dark:text-gray-300">{{ folder.documentCount }} fichiers</span>
          </div>
          
          <span [ngClass]="{
            'bg-green-100 text-green-700 dark:bg-green-900/20 dark:text-green-400': folder.status === 'Complet',
            'bg-orange-100 text-orange-700 dark:bg-orange-900/20 dark:text-orange-400': folder.status === 'Incomplet',
            'bg-blue-100 text-blue-700 dark:bg-blue-900/20 dark:text-blue-400': folder.status === 'En révision'
          }" class="px-2 py-1 rounded-md text-[10px] font-bold">
            {{ folder.status }}
          </span>
        </div>

        <div class="mt-4 w-full bg-gray-100 dark:bg-gray-800 h-1.5 rounded-full overflow-hidden">
          <div class="bg-indigo-500 h-full transition-all duration-500" [style.width]="folder.status === 'Complet' ? '100%' : '60%'"></div>
        </div>
      </div>

    </div>
  </main>
</div>
