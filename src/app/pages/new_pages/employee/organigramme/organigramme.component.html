<div class="p-8 bg-gray-50 dark:bg-gray-950 min-h-screen overflow-x-auto transition-colors duration-300">
  
  <div class="flex justify-center min-w-max">
    <ul class="flex flex-row">
      <li class="flex flex-col items-center">
        <ng-container *ngTemplateOutlet="nodeTemplate; context: { $implicit: rootEmployee }"></ng-container>
      </li>
    </ul>
  </div>

  <ng-template #nodeTemplate let-node>
    <div class="flex flex-col items-center relative">
      
      <div class="relative z-10 p-4 w-60 bg-white dark:bg-gray-900 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800 hover:shadow-md transition-all group">
        <div class="flex items-center gap-3">
          <img [src]="node.imageUrl" class="w-12 h-12 rounded-full object-cover border-2 border-indigo-500 shadow-sm">
          <div class="text-left overflow-hidden">
            <h4 class="text-sm font-bold text-gray-900 dark:text-white truncate">{{ node.name }}</h4>
            <p class="text-[11px] text-gray-500 dark:text-gray-400 font-medium uppercase tracking-wider">{{ node.role }}</p>
          </div>
        </div>
        
        <div class="mt-3 flex items-center justify-between">
            <span class="text-[10px] px-2 py-0.5 rounded-md font-semibold" 
                  [ngClass]="node.status === 'Actif' ? 'bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-400' : 'bg-yellow-100 text-yellow-700 dark:bg-yellow-900/30 dark:text-yellow-400'">
                {{ node.status }}
            </span>
            
            <button *ngIf="node.children?.length" 
                    (click)="node.isExpanded = !node.isExpanded"
                    class="w-6 h-6 rounded-lg bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300 flex items-center justify-center hover:bg-indigo-600 hover:text-white transition-colors">
              <span class="text-lg leading-none">{{ node.isExpanded ? '−' : '+' }}</span>
            </button>
        </div>
      </div>

      <div *ngIf="node.isExpanded && node.children?.length" class="h-10 w-px bg-gray-300 dark:bg-gray-700 relative"></div>

      <ul *ngIf="node.isExpanded && node.children?.length" class="flex flex-row relative pt-10">
        <div class="absolute top-0 left-[25%] right-[25%] h-px bg-gray-300 dark:bg-gray-700"></div>

        <li *ngFor="let child of node.children; let first = first; let last = last" class="relative px-4 flex flex-col items-center">
          <div class="absolute top-0 h-10 w-px bg-gray-300 dark:bg-gray-700"></div>
          
          <ng-container *ngTemplateOutlet="nodeTemplate; context: { $implicit: child }"></ng-container>
        </li>
      </ul>
    </div>
  </ng-template>

</div>
